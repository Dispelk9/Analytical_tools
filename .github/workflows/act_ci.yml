name: Continuous Integration ACT

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend & apache
        run: |
          docker build -t test-backend ./backend
          docker build -t test-apache ./frontend

  infrastructure-tests:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create CI env files for Compose
        run: |
          mkdir -p backend
          cat > backend/.env <<EOF
          DB_USERNAME=postgres
          DB_PASSWORD=postgres
          DB_HOST=postgres_db
          DB_PORT=5432
          DB_NAME=postgres
          SESSION_SECRET=test-session-secret
          SENDER=test@example.com
          MAIL_PW=test-mail-password
          SMTP_RELAY=smtp.example.com
          GEMINI_MODEL=gemini-2.5-flash-lite
          EOF

      - name: Validate debug Compose config
        env:
          HERMES_API_KEY: test-hermes-key
          HERMES_INFERENCE_PROVIDER: gemini
          GOOGLE_API_KEY: test-google-api-key
          HERMES_MODEL: gemini-2.5-flash-lite
          SIGNAL_ACCOUNT: +49123456789
          SIGNAL_ALLOWED_USERS: +49123456789
        run: docker compose -f docker-compose.debug.yml config

      - name: Validate deploy Compose config
        env:
          TAG: test-tag
          DB_PASSWORD: postgres
          HERMES_API_KEY: test-hermes-key
          HERMES_INFERENCE_PROVIDER: gemini
          GOOGLE_API_KEY: test-google-api-key
          HERMES_MODEL: gemini-2.5-flash-lite
          SIGNAL_ACCOUNT: +49123456789
          SIGNAL_ALLOWED_USERS: +49123456789
        run: |
          mkdir -p deploy/backend deploy/secrets
          cat > deploy/backend/.env <<EOF
          DB_USERNAME=postgres
          DB_PASSWORD=postgres
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=postgres
          SESSION_SECRET=test-session-secret
          SENDER=test@example.com
          MAIL_PW=test-mail-password
          SMTP_RELAY=smtp.example.com
          GEMINI_MODEL=gemini-2.5-flash-lite
          EOF
          printf 'test-gemini-api-key\n' > deploy/secrets/gemini_api_key
          printf 'test-handbook-deploy-key\n' > deploy/secrets/handbook_deploy_key
          printf 'github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAITestKnownHost\n' > deploy/secrets/handbook_known_hosts
          docker compose -f deploy/docker-compose.yml config

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run backend tests
        run: pytest backend/tests

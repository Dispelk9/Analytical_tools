services:
  postgres:
    image: postgres:13
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  handbook-sync:
    image: alpine/git:2.45.2
    container_name: handbook_sync
    profiles: ["handbook-sync"]
    restart: unless-stopped
    environment:
      REPO_URL: ${HANDBOOK_REPO_URL:-git@github.com:Dispelk9/vho-handbook.git}
      BRANCH: ${HANDBOOK_BRANCH:-master}
      SYNC_SECONDS: "300"
    volumes:
      - handbook_data:/data
      - ./handbook-sync.sh:/usr/local/bin/handbook-sync.sh:ro
      - ${HANDBOOK_DEPLOY_KEY_PATH:-./secrets/handbook_deploy_key}:/run/secrets/handbook_deploy_key:ro
      - ${HANDBOOK_KNOWN_HOSTS_PATH:-./secrets/handbook_known_hosts}:/run/secrets/handbook_known_hosts:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/handbook-sync.sh"]

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.debug
    container_name: backend_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      hermes:
        condition: service_started
    env_file:
      - ../backend/.env
    environment:
      DB_PASSWORD: postgres
      DB_HOST: postgres_db
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
      HERMES_BASE_URL: http://hermes:8642
      HERMES_API_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_MODEL: ${HERMES_MODEL:-gemini-2.5-flash-lite}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
    ports:
      - "8080:8080"
    volumes:
      - ${GEMINI_API_KEY_PATH:-/home/vho/Gemini/gemini_api_key}:/run/secrets/gemini_api_key:ro

  telegram-poller:
    build:
      context: ../backend
      dockerfile: Dockerfile.debug
    container_name: telegram_poller
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_started
    env_file:
      - ../backend/.env
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      HERMES_BASE_URL: http://hermes:8642
      HERMES_API_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_MODEL: ${HERMES_MODEL:-gemini-2.5-flash-lite}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      HANDBOOK_ROOT: /data/vho-handbook
    command: ["python", "-m", "services.chatbot.telegram_poller"]
    volumes:
      - handbook_data:/data/vho-handbook:ro

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-gemini}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    expose:
      - "8642"
    volumes:
      - hermes_data:/opt/data
      - ./hermes/config.yaml:/opt/data/config.yaml:ro
      - handbook_data:/workspace/handbook:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.debug
    container_name: apache_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  postgres_data:
  handbook_data:
  hermes_data:

services:
  postgres:
    image: postgres:13
    restart: unless-stopped
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Sync private vho-handbook repo
  handbook-sync:
    image: alpine/git:2.45.2
    restart: unless-stopped
    environment:
      REPO_URL: git@github.com:Dispelk9/vho-handbook.git
      BRANCH: master
      SYNC_SECONDS: "300"
    secrets:
      - handbook_deploy_key
      - handbook_known_hosts
    volumes:
      - handbook_data:/data
      - ./deploy/handbook-sync.sh:/usr/local/bin/handbook-sync.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/handbook-sync.sh"]

  hermes:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: gateway run
    depends_on:
      signal-cli:
        condition: service_started
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-gemini}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      SIGNAL_HTTP_URL: ${SIGNAL_HTTP_URL:-http://signal-cli:8080}
      SIGNAL_ACCOUNT: ${SIGNAL_ACCOUNT:-}
      SIGNAL_ALLOWED_USERS: ${SIGNAL_ALLOWED_USERS:-}
    volumes:
      - hermes_data:/opt/data
      - ./deploy/hermes/config.yaml:/opt/data/config.yaml:ro
      - handbook_data:/workspace/handbook:ro
    expose:
      - "8642"

  signal-cli:
    build:
      context: ./deploy/signal-cli
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SIGNAL_ACCOUNT: ${SIGNAL_ACCOUNT:-}
      SIGNAL_DEVICE_NAME: ${SIGNAL_DEVICE_NAME:-HermesAgent}
    expose:
      - "8080"
    volumes:
      - signal_cli_data:/home/.local/share/signal-cli


  backend:
    image: ghcr.io/dispelk9/analytical_tools_backend:${TAG}
    restart: unless-stopped
    depends_on:
      - postgres
      - handbook-sync
      - hermes
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@postgres:5432/postgres
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
      HERMES_BASE_URL: http://hermes:8642
      HERMES_API_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_MODEL: ${HERMES_MODEL:-gemini-2.5-flash-lite}

      # 🔹 Where handbook appears inside container
      HANDBOOK_ROOT: /data/vho-handbook
    secrets:
      - gemini_api_key
    volumes:
      # 🔹 Mount synced handbook read-only
      - handbook_data:/data/vho-handbook:ro
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/dispelk9/analytical_tools_frontend:${TAG}
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - /etc/letsencrypt/live/analytical.dispelk9.de/fullchain.pem:/usr/local/apache2/conf/fullchain.pem:ro
      - /etc/letsencrypt/live/analytical.dispelk9.de/privkey.pem:/usr/local/apache2/conf/privkey.pem:ro

volumes:
  postgres_data:
  handbook_data:
  hermes_data:
  signal_cli_data:

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key

  handbook_deploy_key:
    file: ./secrets/handbook_deploy_key
  handbook_known_hosts:
    file: ./secrets/handbook_known_hosts

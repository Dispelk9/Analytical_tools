services:
  postgres:
    image: postgres:13
    restart: unless-stopped
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      default:
        aliases:
          - postgres_db

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_db:5432/postgres
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME: https://auth.dispelk9.de
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "127.0.0.1:8084:8080"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Sync private vho-handbook repo
  handbook-sync:
    image: alpine/git:2.45.2
    restart: unless-stopped
    environment:
      REPO_URL: git@github.com:Dispelk9/vho-handbook.git
      BRANCH: master
      SYNC_SECONDS: "300"
    secrets:
      - handbook_deploy_key
      - handbook_known_hosts
    volumes:
      - handbook_data:/data
      - ./deploy/handbook-sync.sh:/usr/local/bin/handbook-sync.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/handbook-sync.sh"]

  hermes:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: gateway run
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-gemini}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      - hermes_data:/opt/data
      - ./deploy/hermes/config.yaml:/opt/data/config.yaml:ro
      - handbook_data:/workspace/handbook:ro
    expose:
      - "8642"

  backend:
    image: ghcr.io/dispelk9/analytical_tools_backend:${TAG}
    restart: unless-stopped
    command: ["/bin/sh", "-c", "rm -rf /tmp/prometheus_multiproc && mkdir -p /tmp/prometheus_multiproc && gunicorn --config services/gunicorn_config.py main:app"]
    depends_on:
      postgres:
        condition: service_healthy
      handbook-sync:
        condition: service_started
      hermes:
        condition: service_started
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@postgres:5432/postgres
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
      HERMES_BASE_URL: http://hermes:8642
      HERMES_API_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_MODEL: ${HERMES_MODEL:-gemini-2.5-flash-lite}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc

      # 🔹 Where handbook appears inside container
      HANDBOOK_ROOT: /data/vho-handbook
    secrets:
      - gemini_api_key
    volumes:
      # 🔹 Mount synced handbook read-only
      - handbook_data:/data/vho-handbook:ro
    ports:
      - "8080:8080"

  telegram-poller:
    image: ghcr.io/dispelk9/analytical_tools_backend:${TAG}
    restart: unless-stopped
    depends_on:
      - handbook-sync
      - hermes
    env_file:
      - backend/.env
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      HERMES_BASE_URL: http://hermes:8642
      HERMES_API_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_MODEL: ${HERMES_MODEL:-gemini-2.5-flash-lite}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      HANDBOOK_ROOT: /data/vho-handbook
    command: ["python", "-m", "services.chatbot.telegram_poller"]
    volumes:
      - handbook_data:/data/vho-handbook:ro

  frontend:
    image: ghcr.io/dispelk9/analytical_tools_frontend:${TAG}
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - /etc/letsencrypt/live/analytical.dispelk9.de/fullchain.pem:/usr/local/apache2/conf/fullchain.pem:ro
      - /etc/letsencrypt/live/analytical.dispelk9.de/privkey.pem:/usr/local/apache2/conf/privkey.pem:ro

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    depends_on:
      - backend
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1:9090}:9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_BIND:-127.0.0.1:3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  handbook_data:
  hermes_data:
  prometheus_data:
  grafana_data:

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key

  handbook_deploy_key:
    file: ./secrets/handbook_deploy_key
  handbook_known_hosts:
    file: ./secrets/handbook_known_hosts

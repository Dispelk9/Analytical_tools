services:
  postgres:
    image: postgres:13
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres   # ✅ must match DB_PASSWORD
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.debug
    container_name: flask_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      hermes:
        condition: service_started
    env_file:
      - backend/.env        # ✅ load exactly your env file
    environment:
      DB_PASSWORD: postgres # ✅ override empty value in .env
      DB_HOST: postgres_db  # matches your .env
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
      HERMES_BASE_URL: http://hermes:8642
      HERMES_API_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_MODEL: ${HERMES_MODEL:-gemini-2.5-flash-lite}
    ports:
      - "8080:8080"
    volumes:
    - /home/vho/Gemini/gemini_api_key:/run/secrets/gemini_api_key:ro

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ${HERMES_API_KEY:-local-dev-hermes-key}
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-gemini}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    expose:
      - "8642"
    volumes:
      - hermes_data:/opt/data
      - ./deploy/hermes/config.yaml:/opt/data/config.yaml:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.debug
    container_name: apache_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  postgres_data:
  hermes_data:
